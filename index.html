<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almarbat API | توثيق واختبار المصادقة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Cairo', 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .base-url {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 50px;
            font-family: monospace;
            font-size: 16px;
            border: 1px solid #667eea;
            color: #667eea;
        }

        /* Server Status */
        .server-status {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(0,0,0,0.3);
        }

        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-light.online {
            background: #44ff44;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Endpoints Grid */
        .endpoint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Endpoint Card */
        .endpoint-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .endpoint-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .method {
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .method-get { background: #10b981; color: #fff; }
        .method-post { background: #3b82f6; color: #fff; }
        .method-put { background: #f59e0b; color: #fff; }
        .method-patch { background: #8b5cf6; color: #fff; }
        .method-delete { background: #ef4444; color: #fff; }

        .endpoint-url {
            font-family: monospace;
            font-size: 14px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 8px;
            flex: 1;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #667eea;
        }

        .card-body {
            padding: 20px;
        }

        .description {
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .arabic-desc {
            background: rgba(102,126,234,0.1);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 14px;
            border-right: 3px solid #667eea;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 15px 0 10px;
            color: #667eea;
        }

        .code-block {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .code-block pre {
            margin: 0;
            color: #10b981;
        }

        .params-list {
            list-style: none;
            padding: 0;
        }

        .params-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .param-name {
            color: #f59e0b;
            font-family: monospace;
        }

        .param-desc {
            color: rgba(255,255,255,0.6);
            margin-right: 10px;
        }

        .required {
            color: #ef4444;
            font-size: 11px;
            margin-right: 5px;
        }

        .test-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .test-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .response-area {
            background: #0f0c29;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .response-area.show {
            display: block;
        }

        /* Token Display */
        .token-display {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 1000;
            border: 1px solid #667eea;
            backdrop-filter: blur(10px);
        }

        .token-label {
            font-size: 12px;
            color: #667eea;
        }

        .token-value {
            font-family: monospace;
            font-size: 11px;
            color: #10b981;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 8px;
            word-break: break-all;
            flex: 1;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .endpoint-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 32px;
            }
            .token-display {
                position: relative;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕌 ALMARBAT API</h1>
            <div class="subtitle">نظام المصادقة والتسجيل - توثيق واختبار الـ API</div>
            <div class="base-url">🔗 http://localhost:9001</div>
        </div>

        <div class="server-status">
            <div class="status-indicator">
                <div class="status-light" id="statusLight"></div>
                <span id="statusText">جاري التحقق من الخادم...</span>
            </div>
        </div>

        <div class="endpoint-grid" id="endpointsGrid">
            <!-- Endpoints will be injected here -->
        </div>

        <div class="token-display" id="tokenDisplay" style="display: none;">
            <span class="token-label">🔑 Token الحالي:</span>
            <span class="token-value" id="currentToken"></span>
            <button class="copy-btn" onclick="copyToken()">📋 نسخ</button>
            <button class="test-btn" onclick="clearToken()" style="background: #ef4444;">🗑️ مسح</button>
        </div>

        <div class="footer">
            <p>Almarbat Marketplace - Mauritania | أفضل سوق للحيوانات في موريتانيا</p>
            <p style="margin-top: 10px;">جميع الحقوق محفوظة © 2026</p>
        </div>
    </div>

    <script>
        let currentToken = '';

        const endpoints = [
            {
                method: 'GET',
                url: '/api/health/',
                name: 'فحص صحة الخادم',
                description: 'التحقق من أن الخادم يعمل بشكل صحيح',
                arabic: 'يستخدم هذا ال endpoint للتحقق من أن الخادم قيد التشغيل ويعمل بشكل طبيعي. لا يتطلب أي توثيق ويعيد الحالة الحالية للنظام.',
                auth: false,
                body: null
            },
            {
                method: 'POST',
                url: '/api/v1/auth/register/',
                name: 'تسجيل مشتري جديد',
                description: 'إنشاء حساب جديد كمشتري',
                arabic: 'يستخدم هذا ال endpoint لتسجيل مستخدم جديد بدور "مشتري". يجب إدخال البيانات الشخصية بما فيها الاسم الكامل، رقم الهاتف، البريد الإلكتروني، كلمة المرور، وعنوان التسليم الافتراضي.',
                auth: false,
                role: 'acheteur',
                body: {
                    nom: "أحمد ولد محمد",
                    telephone: "+22212345678",
                    email: "ahmed@test.com",
                    mot_de_passe: "password123",
                    confirm_mot_de_passe: "password123",
                    role: "acheteur",
                    adresse_livraison_par_defaut: "نواكشوط، تفرغ زينة"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/register/',
                name: 'تسجيل بائع جديد',
                description: 'إنشاء حساب جديد كبائع',
                arabic: 'يستخدم هذا ال endpoint لتسجيل مستخدم جديد بدور "بائع". يجب إدخال البيانات الشخصية بالإضافة إلى الاسم التجاري والموقع الجغرافي للمحل.',
                auth: false,
                role: 'vendeur',
                body: {
                    nom: "مريم بنت أحمد",
                    telephone: "+22287654321",
                    email: "mariem@vendeur.com",
                    mot_de_passe: "password123",
                    confirm_mot_de_passe: "password123",
                    role: "vendeur",
                    nom_commercial: "سوق المرابط المركزي",
                    localisation: "نواكشوط، السبخة"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/register/',
                name: 'تسجيل سائق جديد',
                description: 'إنشاء حساب جديد كسائق توصيل',
                arabic: 'يستخدم هذا ال endpoint لتسجيل مستخدم جديد بدور "سائق". يجب إدخال البيانات الشخصية بالإضافة إلى نوع المركبة ورقم اللوحة.',
                auth: false,
                role: 'livreur',
                body: {
                    nom: "سيدي ولد إبراهيم",
                    telephone: "+22211223344",
                    email: "sidi@livreur.com",
                    mot_de_passe: "password123",
                    confirm_mot_de_passe: "password123",
                    role: "livreur",
                    vehicule_type: "تويوتا هايلكس",
                    plaque_immatriculation: "AB-123-CD"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/register/',
                name: 'تسجيل جزار جديد',
                description: 'إنشاء حساب جديد كجزار',
                arabic: 'يستخدم هذا ال endpoint لتسجيل مستخدم جديد بدور "جزار". يجب إدخال البيانات الشخصية بالإضافة إلى الاسم التجاري، الموقع، نوع الخدمة، ورقم الهاتف المهني.',
                auth: false,
                role: 'boucher',
                body: {
                    nom: "الشيخ ولد أحمد",
                    telephone: "+22299887766",
                    email: "cheikh@boucher.com",
                    mot_de_passe: "password123",
                    confirm_mot_de_passe: "password123",
                    role: "boucher",
                    nom_commercial: "مسلخة الحليمة",
                    localisation: "نواكشوط، لكصر",
                    type_service: "DECOUPE",
                    telephone_pro: "+22245678901"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/login/',
                name: 'تسجيل الدخول',
                description: 'تسجيل الدخول باستخدام البريد الإلكتروني أو رقم الهاتف',
                arabic: 'يستخدم هذا ال endpoint لتسجيل الدخول إلى النظام. يمكن استخدام البريد الإلكتروني أو رقم الهاتف كمُعرّف. عند النجاح، يتم إرجاع رمز JWT الذي يجب استخدامه للطلبات المحمية.',
                auth: false,
                body: {
                    identifier: "ahmed@test.com",
                    mot_de_passe: "password123"
                }
            },
            {
                method: 'GET',
                url: '/api/v1/auth/me/',
                name: 'الملف الشخصي',
                description: 'الحصول على بيانات الملف الشخصي للمستخدم الحالي',
                arabic: 'يستخدم هذا ال endpoint لجلب جميع بيانات المستخدم المسجل دخولاً حالياً. يتطلب هذا ال endpoint توثيق JWT في الـ Header.',
                auth: true,
                body: null
            },
            {
                method: 'PATCH',
                url: '/api/v1/auth/update-profile/',
                name: 'تحديث الملف الشخصي',
                description: 'تحديث بيانات المستخدم',
                arabic: 'يستخدم هذا ال endpoint لتحديث بيانات المستخدم مثل الاسم، عنوان التسليم، أو أي بيانات خاصة بالدور. يتطلب توثيق JWT.',
                auth: true,
                body: {
                    nom: "أحمد ولد محمد - معدل",
                    adresse_livraison_par_defaut: "نواكشوط، عرفات، شارع 42"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/change-password/',
                name: 'تغيير كلمة المرور',
                description: 'تغيير كلمة المرور الحالية',
                arabic: 'يستخدم هذا ال endpoint لتغيير كلمة المرور. يجب إدخال كلمة المرور القديمة والجديدة مع تأكيدها. يتطلب توثيق JWT.',
                auth: true,
                body: {
                    old_password: "password123",
                    new_password: "newPassword456",
                    confirm_new_password: "newPassword456"
                }
            },
            {
                method: 'POST',
                url: '/api/v1/auth/refresh-token/',
                name: 'تحديث الرمز',
                description: 'الحصول على رمز JWT جديد',
                arabic: 'يستخدم هذا ال endpoint لتحديث رمز JWT قبل انتهاء صلاحيته. يتطلب الرمز الحالي ويعيد رمزاً جديداً صالحاً.',
                auth: true,
                body: null
            },
            {
                method: 'POST',
                url: '/api/v1/auth/logout/',
                name: 'تسجيل الخروج',
                description: 'تسجيل الخروج من النظام',
                arabic: 'يستخدم هذا ال endpoint لتسجيل الخروج. يقوم العميل بحذف الرمز محلياً. يتطلب توثيق JWT.',
                auth: true,
                body: null
            }
        ];

        async function checkServer() {
            const statusLight = document.getElementById('statusLight');
            const statusText = document.getElementById('statusText');
            
            try {
                const response = await fetch('http://localhost:9001/api/health/');
                if (response.ok) {
                    statusLight.classList.add('online');
                    statusText.innerHTML = '✅ الخادم يعمل - http://localhost:9001';
                } else {
                    statusText.innerHTML = '⚠️ الخادم لا يستجيب بشكل صحيح';
                }
            } catch (error) {
                statusLight.classList.remove('online');
                statusText.innerHTML = '❌ الخادم لا يعمل - تأكد من تشغيل الخادم على port 9001';
            }
        }

        async function testEndpoint(endpoint) {
            const url = `http://localhost:9001${endpoint.url}`;
            const headers = {
                'Content-Type': 'application/json'
            };
            
            if (endpoint.auth && currentToken) {
                headers['Authorization'] = `Bearer ${currentToken}`;
            }
            
            const options = {
                method: endpoint.method,
                headers: headers
            };
            
            if (endpoint.body && (endpoint.method === 'POST' || endpoint.method === 'PATCH' || endpoint.method === 'PUT')) {
                options.body = JSON.stringify(endpoint.body);
            }
            
            const responseArea = document.getElementById(`response-${endpoint.url.replace(/\//g, '-')}`);
            responseArea.classList.add('show');
            responseArea.innerHTML = '<div style="color: #f59e0b;">⏳ جاري الإرسال...</div>';
            
            try {
                const startTime = Date.now();
                const response = await fetch(url, options);
                const endTime = Date.now();
                const data = await response.json();
                
                // If login successful, save token
                if (endpoint.url === '/api/v1/auth/login/' && response.ok && data.token) {
                    currentToken = data.token;
                    document.getElementById('tokenDisplay').style.display = 'flex';
                    document.getElementById('currentToken').innerText = currentToken;
                }
                
                // If register successful, save token
                if (endpoint.url === '/api/v1/auth/register/' && response.ok && data.token) {
                    currentToken = data.token;
                    document.getElementById('tokenDisplay').style.display = 'flex';
                    document.getElementById('currentToken').innerText = currentToken;
                }
                
                responseArea.innerHTML = `
                    <div style="color: #10b981;">✅ الحالة: ${response.status} ${response.statusText}</div>
                    <div style="color: #667eea;">⏱️ وقت الاستجابة: ${endTime - startTime}ms</div>
                    <div style="margin-top: 10px; color: #fff;">📦 البيانات:</div>
                    <pre style="margin-top: 5px; overflow-x: auto;">${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                responseArea.innerHTML = `
                    <div style="color: #ef4444;">❌ خطأ: ${error.message}</div>
                    <div style="margin-top: 10px;">تأكد من أن الخادم يعمل على http://localhost:9001</div>
                `;
            }
        }

        function copyToken() {
            navigator.clipboard.writeText(currentToken);
            alert('✅ تم نسخ Token إلى الحافظة');
        }

        function clearToken() {
            currentToken = '';
            document.getElementById('tokenDisplay').style.display = 'none';
            document.getElementById('currentToken').innerText = '';
            alert('🗑️ تم مسح Token');
        }

        function renderEndpoints() {
            const grid = document.getElementById('endpointsGrid');
            
            endpoints.forEach(endpoint => {
                const card = document.createElement('div');
                card.className = 'endpoint-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="method method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                        <span class="endpoint-url">${endpoint.url}</span>
                        <button class="copy-btn" onclick="copyToClipboard('http://localhost:9001${endpoint.url}')">📋 نسخ الرابط</button>
                    </div>
                    <div class="card-body">
                        <h3 style="margin-bottom: 10px;">${endpoint.name}</h3>
                        <div class="description">${endpoint.description}</div>
                        <div class="arabic-desc">
                            📖 <strong>شرح بالعربية:</strong><br>
                            ${endpoint.arabic}
                            ${endpoint.auth ? '<br><br>🔐 <strong>هذا ال endpoint يتطلب توثيق (JWT Token)</strong>' : '<br><br>🌐 <strong>هذا ال endpoint مفتوح ولا يتطلب توثيق</strong>'}
                        </div>
                        
                        ${endpoint.body ? `
                            <div class="section-title">📦 بيانات الإرسال (Body):</div>
                            <div class="code-block">
                                <pre>${JSON.stringify(endpoint.body, null, 2)}</pre>
                            </div>
                        ` : ''}
                        
                        <button class="test-btn" onclick="testEndpoint(${JSON.stringify(endpoint).replace(/"/g, '&quot;')})">
                            🧪 اختبار الـ Endpoint
                        </button>
                        
                        <div id="response-${endpoint.url.replace(/\//g, '-')}" class="response-area"></div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('✅ تم نسخ الرابط: ' + text);
        }

        // Auto-check server every 10 seconds
        setInterval(checkServer, 10000);
        
        // Initialize
        renderEndpoints();
        checkServer();
        
        // Check if token exists in localStorage
        const savedToken = localStorage.getItem('almarbat_token');
        if (savedToken) {
            currentToken = savedToken;
            document.getElementById('tokenDisplay').style.display = 'flex';
            document.getElementById('currentToken').innerText = currentToken;
        }
        
        // Save token to localStorage when changed
        setInterval(() => {
            if (currentToken) {
                localStorage.setItem('almarbat_token', currentToken);
            } else {
                localStorage.removeItem('almarbat_token');
            }
        }, 1000);
    </script>
</body>
</html>
